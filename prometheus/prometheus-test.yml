global:
  scrape_interval: 30s

scrape_configs:
  - job_name: 'deal-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['deal-service:8080']
  - job_name: 'client-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['client-service:8080']
  - job_name: 'risk-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['risk-service:8080']
  - job_name: 'currency-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['currency-service:8080']
