services:
  postgres-deal:
    image: postgres:15
    container_name: postgres-deal
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DEAL_DB}
      POSTGRES_USER: ${POSTGRES_DEAL_USER}
      POSTGRES_PASSWORD: ${POSTGRES_DEAL_PASSWORD}
    volumes:
      - postgres_deal_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 300m
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_DEAL_USER} -d ${POSTGRES_DEAL_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - data-net

  postgres-keycloak:
    image: postgres:15
    container_name: postgres-keycloak
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_KEYCLOAK_DB}
      POSTGRES_USER: ${POSTGRES_KEYCLOAK_USER}
      POSTGRES_PASSWORD: ${POSTGRES_KEYCLOAK_PASSWORD}
    volumes:
      - postgres_keycloak_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 300m
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_KEYCLOAK_USER} -d ${POSTGRES_KEYCLOAK_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - data-net

  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    container_name: zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_SERVER_JVMFLAGS: "-Xmx384m -Xms384m"
    ports:
      - "2181:2181"
    deploy:
      resources:
        limits:
          memory: 512m
    healthcheck:
      test: ["CMD", "echo", "ruok", "|", "nc", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - data-net

  kafka:
    image: confluentinc/cp-kafka:7.4.4
    container_name: kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_HEAP_OPTS: "-Xmx1024m -Xms1024m"
    deploy:
      resources:
        limits:
          memory: 1536m
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 10s
      retries: 5
    networks:
      - data-net

  kafka-init:
    image: confluentinc/cp-kafka:7.4.4
    container_name: kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    command: |
      bash -c "
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic risk-requests        --partitions 3 --replication-factor 1
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic risk-responses       --partitions 3 --replication-factor 1
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic client-events        --partitions 3 --replication-factor 1
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic deal-events          --partitions 3 --replication-factor 1
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic risk-events          --partitions 3 --replication-factor 1
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic entity-event-results --partitions 1 --replication-factor 1
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic transaction-events  --partitions 3 --replication-factor 1
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic transaction-results      --partitions 3 --replication-factor 1
      exit 0
      "
    networks:
      - data-net

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    restart: unless-stopped
    ports:
      - "8095:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    deploy:
      resources:
        limits:
          memory: 256m
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - data-net

  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: keycloak
    restart: unless-stopped
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN_USER}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_HOSTNAME: http://keycloak:8080
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_HTTP_ENABLED: "true"
      KC_HEALTH_ENABLED: true
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres-keycloak:5432/${POSTGRES_KEYCLOAK_DB}
      KC_DB_USERNAME: ${POSTGRES_KEYCLOAK_USER}
      KC_DB_PASSWORD: ${POSTGRES_KEYCLOAK_PASSWORD}
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
      - ./keycloak/themes:/opt/keycloak/themes:ro
    ports:
      - "8080:8080"
    command: start-dev --import-realm
    deploy:
      resources:
        limits:
          memory: 1024m
    depends_on:
      postgres-keycloak:
        condition: service_healthy
    healthcheck:
      test: [ 'CMD-SHELL', '[ -f /tmp/HealthCheck.java ] || echo "public class HealthCheck { public static void main(String[] args) throws java.lang.Throwable { System.exit(java.net.HttpURLConnection.HTTP_OK == ((java.net.HttpURLConnection)new java.net.URL(args[0]).openConnection()).getResponseCode() ? 0 : 1); } }" > /tmp/HealthCheck.java && java /tmp/HealthCheck.java http://localhost:8080/health/live' ]
      interval: 5s
      timeout: 5s
      retries: 30
    networks:
      - app-net
      - data-net

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: jaeger
    restart: unless-stopped
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"
      - "14250:14250"
      - "14268:14268"
    deploy:
      resources:
        limits:
          memory: 384m
    networks:
      - monitoring-net

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms896m -Xmx896m"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
      - "9300:9300"
    deploy:
      resources:
        limits:
          memory: 1536m
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - monitoring-net

  logstash:
    image: docker.elastic.co/logstash/logstash:8.11.0
    container_name: logstash
    restart: unless-stopped
    volumes:
      - ./logstash/pipeline:/usr/share/logstash/pipeline:ro
      - ./logstash/config/logstash.yml:/usr/share/logstash/config/logstash.yml:ro
    ports:
      - "5000:5000"
      - "5000:5000/udp"
      - "9600:9600"
    environment:
      LS_JAVA_OPTS: "-Xmx256m -Xms256m"
    deploy:
      resources:
        limits:
          memory: 768m
    depends_on:
      elasticsearch:
        condition: service_started
    networks:
      - monitoring-net

  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.0
    container_name: kibana
    restart: unless-stopped
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    ports:
      - "5601:5601"
    deploy:
      resources:
        limits:
          memory: 768m
    depends_on:
      elasticsearch:
        condition: service_started
    networks:
      - monitoring-net

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus/prometheus-test.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    ports:
      - "9090:9090"
    deploy:
      resources:
        limits:
          memory: 320m
    networks:
      - monitoring-net

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3001:3000"
    deploy:
      resources:
        limits:
          memory: 512m
    depends_on:
      - prometheus
    networks:
      - monitoring-net


  currency-service:
    image: admin194/currency-service:latest
    container_name: currency-service
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: docker
      MANAGEMENT_ZIPKIN_TRACING_ENDPOINT: http://jaeger:14268/api/traces
      LOGGING_LOGSTASH_ENCODER_DESTINATION: logstash:5000
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: health,info,prometheus,metrics
      MANAGEMENT_PROMETHEUS_METRICS_EXPORT_ENABLED: "true"
    depends_on:
      - jaeger
      - logstash
    ports:
      - "9091:9090"
      - "8086:8080"
    deploy:
      resources:
        limits:
          memory: 512m
    networks:
      - app-net
      - monitoring-net


  deal-service:
    image: admin194/deal-service:latest
    container_name: deal-service
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: docker
      POSTGRES_DEAL_DB: ${POSTGRES_DEAL_DB}
      POSTGRES_DEAL_USER: ${POSTGRES_DEAL_USER}
      POSTGRES_DEAL_PASSWORD: ${POSTGRES_DEAL_PASSWORD}
      MANAGEMENT_ZIPKIN_TRACING_ENDPOINT: http://jaeger:14268/api/traces
      LOGGING_LOGSTASH_ENCODER_DESTINATION: logstash:5000
    depends_on:
      postgres-deal:
        condition: service_healthy
      kafka:
        condition: service_healthy
      keycloak:
        condition: service_started
      currency-service:
        condition: service_started
      jaeger:
        condition: service_started
      logstash:
        condition: service_started
    ports:
      - "8083:8080"
    deploy:
      resources:
        limits:
          memory: 1536m
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 10
    networks:
      - app-net
      - data-net
      - monitoring-net

  client-service:
    image: admin194/client-service:latest
    container_name: client-service
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: docker
      POSTGRES_DEAL_DB: ${POSTGRES_DEAL_DB}
      POSTGRES_DEAL_USER: ${POSTGRES_DEAL_USER}
      POSTGRES_DEAL_PASSWORD: ${POSTGRES_DEAL_PASSWORD}
      MANAGEMENT_ZIPKIN_TRACING_ENDPOINT: http://jaeger:14268/api/traces
      LOGGING_LOGSTASH_ENCODER_DESTINATION: logstash:5000
    depends_on:
      deal-service:
        condition: service_healthy
    ports:
      - "8081:8080"
    deploy:
      resources:
        limits:
          memory: 896m
    networks:
      - app-net
      - data-net
      - monitoring-net

  risk-service:
    image: admin194/risk-service:latest
    container_name: risk-service
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: docker
      POSTGRES_DEAL_DB: ${POSTGRES_DEAL_DB}
      POSTGRES_DEAL_USER: ${POSTGRES_DEAL_USER}
      POSTGRES_DEAL_PASSWORD: ${POSTGRES_DEAL_PASSWORD}
      MANAGEMENT_ZIPKIN_TRACING_ENDPOINT: http://jaeger:14268/api/traces
      LOGGING_LOGSTASH_ENCODER_DESTINATION: logstash:5000
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: health,info,prometheus,metrics
      MANAGEMENT_PROMETHEUS_METRICS_EXPORT_ENABLED: "true"
    depends_on:
      deal-service:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "8082:8080"
    deploy:
      resources:
        limits:
          memory: 896m
    networks:
      - app-net
      - data-net
      - monitoring-net

  frontend:
    image: admin194/frontend:latest
    container_name: frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
    deploy:
      resources:
        limits:
          memory: 512m
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:3000/ui || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - frontend-net

  api-gateway:
    image: admin194/api-gateway:latest
    container_name: api-gateway
    restart: unless-stopped
    ports:
      - "8085:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      KC_CLIENT_SECRET: ${KC_CLIENT_SECRET}
      DEAL_SERVICE_URL: http://deal-service:8080
      TRANSACTION_SERVICE_URL: http://transaction-service:8080
      FRONTEND_URL: http://frontend:3000
      MANAGEMENT_ZIPKIN_TRACING_ENDPOINT: http://jaeger:14268/api/traces
      LOGGING_LOGSTASH_ENCODER_DESTINATION: logstash:5000
      JAVA_TOOL_OPTIONS: "-Xms256m -Xmx512m"
    depends_on:
      keycloak:
        condition: service_started
      deal-service:
        condition: service_healthy
      frontend:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 896m
    networks:
      - frontend-net
      - app-net
      - monitoring-net

  transaction-service:
    image: admin194/transaction-service:latest
    container_name: transaction-service
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: docker
      MANAGEMENT_ZIPKIN_TRACING_ENDPOINT: http://jaeger:14268/api/traces
      LOGGING_LOGSTASH_ENCODER_DESTINATION: logstash:5000
    depends_on:
      kafka:
        condition: service_healthy
      jaeger:
        condition: service_started
      logstash:
        condition: service_started
    ports:
      - "8087:8080"
    deploy:
      resources:
        limits:
          memory: 768m
    networks:
      - app-net
      - data-net
      - monitoring-net

volumes:
  postgres_deal_data:
  postgres_keycloak_data:
  prometheus_data:
  grafana_data:
  es_data:

networks:
  frontend-net:
    driver: bridge
  app-net:
    driver: bridge
  data-net:
    driver: bridge
  monitoring-net:
    driver: bridge
